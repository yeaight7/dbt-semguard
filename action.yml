name: dbt-semguard
description: Compare dbt Semantic Layer semantics and fail on breaking changes.

inputs:
  python-version:
    description: Python version used to run dbt-semguard
    default: "3.12"
  base-ref:
    description: Base git ref for YAML comparison
    required: false
  head-ref:
    description: Head git ref for YAML comparison
    required: false
  project-dir:
    description: dbt project directory
    default: "."
  base-manifest:
    description: Optional base manifest.json path
    required: false
  head-manifest:
    description: Optional head manifest.json path
    required: false
  fail-on:
    description: Minimum severity that should fail the action
    default: "breaking"
  artifact-name:
    description: Name for the uploaded JSON artifact
    default: "semguard-report"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dbt-semguard
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install .

    - name: Build report args
      id: args
      shell: bash
      run: |
        if [[ -n "${{ inputs.base-manifest }}" || -n "${{ inputs.head-manifest }}" ]]; then
          echo "diff_args=--base-manifest \"${{ inputs.base-manifest }}\" --head-manifest \"${{ inputs.head-manifest }}\"" >> "$GITHUB_OUTPUT"
        else
          echo "diff_args=--base-ref \"${{ inputs.base-ref }}\" --head-ref \"${{ inputs.head-ref }}\" --project-dir \"${{ inputs.project-dir }}\"" >> "$GITHUB_OUTPUT"
        fi

    - name: Write JSON report
      shell: bash
      run: |
        eval "semguard diff ${{ steps.args.outputs.diff_args }} --format json" > semguard-report.json

    - name: Write workflow summary
      shell: bash
      run: |
        eval "semguard diff ${{ steps.args.outputs.diff_args }} --format markdown" >> "$GITHUB_STEP_SUMMARY"

    - name: Enforce severity threshold
      shell: bash
      run: |
        eval "semguard check ${{ steps.args.outputs.diff_args }} --fail-on ${{ inputs.fail-on }}"

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: semguard-report.json
