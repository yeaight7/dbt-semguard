name: dbt-semguard
description: Compare dbt Semantic Layer semantics and fail on breaking changes.
branding:
  icon: alert-triangle
  color: red

inputs:
  python-version:
    description: Python version used to run dbt-semguard
    default: "3.12"
  base-ref:
    description: Base git ref for YAML comparison
    required: false
  head-ref:
    description: Head git ref for YAML comparison
    required: false
  project-dir:
    description: dbt project directory
    default: "."
  base-manifest:
    description: Optional base dbt semantic_manifest.json path
    required: false
  head-manifest:
    description: Optional head dbt semantic_manifest.json path
    required: false
  fail-on:
    description: 'Minimum severity that should fail the action. Accepted values: `breaking`, `risky`, `safe`, `none`.'
    default: "breaking"
  pr-comment:
    description: When true, publish or update a sticky PR comment with the semguard report
    default: "false"
  pr-comment-mode:
    description: 'PR comment behavior when a previous dbt-semguard comment exists. Use `sticky` to update the existing dbt-semguard comment or `create` to always post a new comment.'
    default: "sticky"
  github-token:
    description: GitHub token used for PR comment publishing
    required: false
  artifact-name:
    description: 'Name for the uploaded JSON artifact. Internal report filenames are derived from this value.'
    default: "semguard-report"

outputs:
  highest-severity:
    description: Highest severity detected in the generated report
    value: ${{ steps.generate.outputs.highest-severity }}
  blocking:
    description: Whether the configured fail-on threshold was reached
    value: ${{ steps.generate.outputs.blocking }}
  breaking-count:
    description: Number of breaking changes in the report
    value: ${{ steps.generate.outputs.breaking-count }}
  risky-count:
    description: Number of risky changes in the report
    value: ${{ steps.generate.outputs.risky-count }}
  safe-count:
    description: Number of safe changes in the report
    value: ${{ steps.generate.outputs.safe-count }}

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dbt-semguard
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        VENV_DIR="$RUNNER_TEMP/dbt-semguard-venv"
        python -m venv "$VENV_DIR"
        "$VENV_DIR/bin/python" -m pip install --upgrade pip
        "$VENV_DIR/bin/python" -m pip install "$ACTION_PATH"
        echo "$VENV_DIR/bin" >> "$GITHUB_PATH"

    - name: Resolve report paths
      shell: bash
      env:
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
      run: |
        REPORT_DIR="$(mktemp -d "$RUNNER_TEMP/dbt-semguard.XXXXXX")"
        REPORT_BASENAME="$(python - <<'PY'
        import os
        import re

        artifact_name = os.environ.get("ARTIFACT_NAME", "").strip() or "semguard-report"
        sanitized = re.sub(r"[^A-Za-z0-9._-]+", "-", artifact_name).strip(".-_")
        print(sanitized or "semguard-report")
        PY
        )"
        {
          echo "REPORT_DIR=$REPORT_DIR"
          echo "REPORT_BASENAME=$REPORT_BASENAME"
          echo "REPORT_JSON_PATH=$REPORT_DIR/$REPORT_BASENAME.json"
          echo "REPORT_MD_PATH=$REPORT_DIR/$REPORT_BASENAME.md"
        } >> "$GITHUB_ENV"

    - name: Generate dbt-semguard report
      id: generate
      shell: bash
      env:
        BASE_REF: ${{ inputs.base-ref }}
        HEAD_REF: ${{ inputs.head-ref }}
        PROJECT_DIR: ${{ inputs.project-dir }}
        BASE_MANIFEST: ${{ inputs.base-manifest }}
        HEAD_MANIFEST: ${{ inputs.head-manifest }}
        FAIL_ON: ${{ inputs.fail-on }}
        REPORT_DIR: ${{ env.REPORT_DIR }}
        REPORT_BASENAME: ${{ env.REPORT_BASENAME }}
      run: |
        python -m dbt_semguard.action_runner

    - name: Publish PR comment
      if: ${{ inputs.pr-comment == 'true' }}
      shell: bash
      env:
        SEMGUARD_GITHUB_TOKEN: ${{ inputs.github-token }}
        REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        PR_COMMENT_MODE: ${{ inputs.pr-comment-mode }}
      run: |
        if [[ -z "$SEMGUARD_GITHUB_TOKEN" ]]; then
          echo "dbt-semguard: skipping PR comment because github-token was not provided."
          exit 0
        fi
        
        PR_ARGS=""
        if [[ -n "$PR_NUMBER" ]]; then
          PR_ARGS="--pr-number $PR_NUMBER --body-file $REPORT_MD_PATH"
        fi
        
        semguard comment-pr \
          $PR_ARGS \
          --repo "$REPOSITORY" \
          --head-sha "$HEAD_SHA" \
          --report-json "$REPORT_JSON_PATH" \
          --mode "$PR_COMMENT_MODE"

    - name: Enforce severity threshold
      shell: bash
      env:
        BLOCKING: ${{ steps.generate.outputs.blocking }}
        HIGHEST_SEVERITY: ${{ steps.generate.outputs.highest-severity }}
      run: |
        if [[ "$BLOCKING" == "true" ]]; then
          echo "dbt-semguard: blocking due to highest severity '$HIGHEST_SEVERITY'."
          exit 1
        fi

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ env.REPORT_JSON_PATH }}
        if-no-files-found: warn
