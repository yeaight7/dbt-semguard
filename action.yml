name: dbt-semguard
description: Compare dbt Semantic Layer semantics and fail on breaking changes.
branding:
  icon: shield
  color: blue

inputs:
  python-version:
    description: Python version used to run dbt-semguard
    default: "3.12"
  base-ref:
    description: Base git ref for YAML comparison
    required: false
  head-ref:
    description: Head git ref for YAML comparison
    required: false
  project-dir:
    description: dbt project directory
    default: "."
  base-manifest:
    description: Optional base dbt semantic_manifest.json path
    required: false
  head-manifest:
    description: Optional head dbt semantic_manifest.json path
    required: false
  fail-on:
    description: Minimum severity that should fail the action
    default: "breaking"
  artifact-name:
    description: Name for the uploaded JSON artifact
    default: "semguard-report"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dbt-semguard
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "${{ github.action_path }}"

    - name: Run dbt-semguard
      shell: bash
      run: |
        if [[ -n "${{ inputs.base-manifest }}" || -n "${{ inputs.head-manifest }}" ]]; then
          semguard diff --base-manifest "${{ inputs.base-manifest }}" --head-manifest "${{ inputs.head-manifest }}" --format json > semguard-report.json
          semguard diff --base-manifest "${{ inputs.base-manifest }}" --head-manifest "${{ inputs.head-manifest }}" --format markdown >> "$GITHUB_STEP_SUMMARY"
          semguard check --base-manifest "${{ inputs.base-manifest }}" --head-manifest "${{ inputs.head-manifest }}" --fail-on "${{ inputs.fail-on }}"
        else
          semguard diff --base-ref "${{ inputs.base-ref }}" --head-ref "${{ inputs.head-ref }}" --project-dir "${{ inputs.project-dir }}" --format json > semguard-report.json
          semguard diff --base-ref "${{ inputs.base-ref }}" --head-ref "${{ inputs.head-ref }}" --project-dir "${{ inputs.project-dir }}" --format markdown >> "$GITHUB_STEP_SUMMARY"
          semguard check --base-ref "${{ inputs.base-ref }}" --head-ref "${{ inputs.head-ref }}" --project-dir "${{ inputs.project-dir }}" --fail-on "${{ inputs.fail-on }}"
        fi

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: semguard-report.json
