name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest

  action-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Seed comparison refs
        run: |
          git config user.email "ci@example.com"
          git config user.name "CI"
          mkdir -p models
          cat > models/orders.yml <<'EOF'
          models:
            - name: fct_orders
              semantic_model:
                enabled: true
                name: orders
              agg_time_dimension: ordered_at
              columns:
                - name: order_id
                  entity:
                    name: order
                    type: primary
                - name: ordered_at
                  granularity: day
                  dimension:
                    type: time
              metrics:
                - name: order_count
                  type: simple
                  agg: count
                  expr: 1
          EOF
          git add models/orders.yml
          git commit -m "base semantic model"
          echo "BASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          cat >> models/orders.yml <<'EOF'

          metrics:
            - name: orders_per_day
              type: derived
              expr: order_count
              input_metrics:
                - name: order_count
          EOF
          git add models/orders.yml
          git commit -m "head semantic model"
          echo "HEAD_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - uses: ./
        with:
          base-ref: ${{ env.BASE_SHA }}
          head-ref: ${{ env.HEAD_SHA }}
          fail-on: breaking
