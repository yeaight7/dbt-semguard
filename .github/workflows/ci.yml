name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest

  action-smoke-git:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Seed comparison refs
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "ci@example.com"
          git config user.name "CI"
          rm -rf smoke-project
          mkdir -p smoke-project/models
          cp tests/fixtures/projects/base/models/orders.yml smoke-project/models/orders.yml
          git add smoke-project/models/orders.yml
          git commit -m "base semantic model fixture"
          echo "BASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          cp tests/fixtures/projects/breaking_change/models/orders.yml smoke-project/models/orders.yml
          git add smoke-project/models/orders.yml
          git commit -m "breaking semantic model fixture"
          echo "HEAD_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Run local action against intentional breaking change
        id: semguard
        uses: ./
        continue-on-error: true
        with:
          base-ref: ${{ env.BASE_SHA }}
          head-ref: ${{ env.HEAD_SHA }}
          project-dir: smoke-project
          fail-on: breaking

      - name: Assert breaking-change smoke failure
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "$BASE_SHA" ]]
          [[ -n "$HEAD_SHA" ]]
          git cat-file -e "${BASE_SHA}^{commit}"
          git cat-file -e "${HEAD_SHA}^{commit}"
          if [[ "${{ steps.semguard.outcome }}" != "failure" ]]; then
            echo "Expected the local action smoke test to fail on the seeded breaking change."
            exit 1
          fi
          test -f semguard-report.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("semguard-report.json").read_text(encoding="utf-8"))
          assert payload["highest_severity"] == "breaking", payload
          assert payload["blocking"] is True, payload
          messages = "\n".join(change["message"] for change in payload["changes"])
          assert "gross_revenue" in messages, messages
          PY

  action-smoke-manifest:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Create semantic manifest fixtures with hostile paths
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "tmp artifacts/base manifest" "tmp artifacts/head manifest"
          cp tests/fixtures/manifest/base_semantic_manifest.json "tmp artifacts/base manifest/semantic_manifest.json"
          python - <<'PY'
          import json
          from pathlib import Path

          base_path = Path("tests/fixtures/manifest/base_semantic_manifest.json")
          head_path = Path("tmp artifacts/head manifest/semantic_manifest.json")
          payload = json.loads(base_path.read_text(encoding="utf-8"))
          payload["metrics"][0]["type_params"]["metric_aggregation_params"]["agg"] = "avg"
          head_path.write_text(json.dumps(payload), encoding="utf-8")
          PY

      - name: Run local action against manifest fixtures
        id: semguard
        uses: ./
        continue-on-error: true
        with:
          base-manifest: tmp artifacts/base manifest/semantic_manifest.json
          head-manifest: tmp artifacts/head manifest/semantic_manifest.json
          fail-on: breaking

      - name: Assert manifest smoke failure
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.semguard.outcome }}" != "failure" ]]; then
            echo "Expected the manifest smoke test to fail on the seeded breaking change."
            exit 1
          fi
          test -f semguard-report.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("semguard-report.json").read_text(encoding="utf-8"))
          assert payload["highest_severity"] == "breaking", payload
          assert payload["blocking"] is True, payload
          messages = "\n".join(change["message"] for change in payload["changes"])
          assert "gross_revenue" in messages, messages
          PY
