models:
  - name: fct_orders
    semantic_model:
      enabled: true
      name: orders
    agg_time_dimension: ordered_at
    columns:
      - name: order_id
        entity:
          name: order
          type: primary
      - name: customer_id
        entity:
          name: customer
          type: foreign
      - name: sales_rep_id
        entity:
          name: sales_rep
          type: foreign
      - name: ordered_at
        granularity: day
        dimension:
          type: time
      - name: country
        dimension:
          type: categorical
      - name: sales_channel
        dimension:
          type: categorical
    metrics:
      - name: gross_revenue
        label: Gross Revenue (Net of voids)
        type: simple
        agg: sum
        expr: order_total
        filter: order_status in ('completed', 'refunded')
      - name: order_count
        type: simple
        agg: count
        expr: 1
      - name: refunded_orders
        type: simple
        agg: count
        expr: 1
        filter: order_status = 'refunded'

metrics:
  - name: aov
    type: ratio
    label: Average order value
    numerator: gross_revenue
    denominator: order_count
